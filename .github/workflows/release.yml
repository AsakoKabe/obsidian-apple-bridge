name: Release Obsidian Plugin

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

env:
  PLUGIN_NAME: apple-bridge

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "Tag: $TAG_VERSION | Manifest: $MANIFEST_VERSION | Package: $PACKAGE_VERSION"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match manifest.json ($MANIFEST_VERSION)"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match package.json ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1)
          if [ "$PREV_TAG" = "$GITHUB_REF_NAME" ] || [ -z "$PREV_TAG" ]; then
            echo "First release — no previous tag found."
            CHANGELOG="Initial release of Apple Bridge for Obsidian."
          else
            echo "Generating changelog from $PREV_TAG to $GITHUB_REF_NAME"
            CHANGELOG=$(git log "$PREV_TAG".."$GITHUB_REF_NAME" --pretty=format:"- %s (%h)" --no-merges)
          fi
          {
            echo "body<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            echo "$CHANGELOG"
            echo ""
            echo "**Full Changelog**: https://github.com/\${{ github.repository }}/compare/${PREV_TAG}...${GITHUB_REF_NAME}"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release artifacts
        run: |
          mkdir -p release
          cp main.js manifest.json release/
          [ -f styles.css ] && cp styles.css release/ || true
          cd release && zip -r "../${{ env.PLUGIN_NAME }}.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.body }}
          files: |
            ${{ env.PLUGIN_NAME }}.zip
            release/main.js
            release/manifest.json
            release/styles.css
